{% extends "base.html" %}
{% import "_macros.html" as macros %}
{% block title %}New account — {{ app_title }}{% endblock %}
{% block body_class %}page-admin{% endblock %}
{% block content %}
<div class="admin">
  <p class="admin__back"><a href="{{ url_for('pages.admin_accounts') }}">&lsaquo; Accounts</a></p>
  <h1 class="admin__title">New account</h1>
  <form class="admin__form" method="post" action="{{ url_for('pages.admin_new_account') }}">
    {{ macros.person_picker(unbound_people) }}

    <label class="login__label" for="admin-username">Username</label>
    <input class="login__input" type="text" id="admin-username" name="username"
           autocomplete="off" pattern="[a-z0-9-]{3,32}" required>

    <label class="login__label" for="admin-password">Password</label>
    <input class="login__input" type="password" id="admin-password" name="password"
           autocomplete="new-password" minlength="8" required>

    <label class="login__label" for="admin-role">Role</label>
    <select class="login__input" id="admin-role" name="role">
      {% for role in roles %}
      <option value="{{ role }}">{{ role|capitalize }}</option>
      {% endfor %}
    </select>

    <button class="btn btn--primary login__submit" type="submit">Create account</button>
  </form>
</div>
{% endblock %}
