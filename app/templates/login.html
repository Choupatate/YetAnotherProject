{% extends "base.html" %}
{% block title %}Log in — {{ app_title }}{% endblock %}
{% block body_class %}page-login{% endblock %}
{% block content %}
<div class="login">
  <h1 class="login__title">{{ app_title }}</h1>
  <p class="login__subtitle">A private memory journal.</p>
  <img class="illo login__illo" src="{{ url_for('static', filename='img/login-campfire.jpg') }}"
       alt="" loading="lazy" decoding="async" width="856" height="735">
  <form class="login__form" method="post" action="{{ url_for('auth.login') }}">
    <label class="login__label" for="password">Password</label>
    <input class="login__input" type="password" id="password" name="password" autocomplete="current-password" autofocus required>
    <button class="btn btn--primary login__submit" type="submit">Log in</button>
  </form>
</div>
{% endblock %}
